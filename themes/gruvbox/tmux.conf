# kol-theme: gruvbox — the .tmux.conf originals, verbatim (this theme = "change back").
set -g status-style "bg=default,fg=#928374"
set -g status-right "#[fg=#928374]%a %d %b  %H:%M "
set -g window-status-style          "fg=#d79921"
set -g window-status-current-style  "fg=#fabd2f"
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fe8019"
set -g mode-style "bg=#504945,fg=#ebdbb2"
set -g message-style "bg=#d79921,fg=#282828"
set -g message-command-style "bg=#d79921,fg=#282828"

# quiet-bar structure (resets linkarzu's pill formats on switch-back)
set -g status-left ""
set -g status-left-length 10
set -g window-status-separator ""
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
