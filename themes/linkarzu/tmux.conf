# kol-theme: linkarzu — colors AND his bar structure (the only theme that
# restyles the bar: session pill + per-window index chips, the catppuccin/tmux
# look hand-rolled in pure format strings — no plugin). Rounded caps are
# powerline-extra glyphs (E0B6/E0B4), present in MesloLGS NF.
set -g status-style "bg=default,fg=#a5afc2"
set -g pane-border-style "fg=#232e3b"
set -g pane-active-border-style "fg=#37f499"
set -g mode-style "bg=#314154,fg=#ebfafa"
set -g message-style "bg=#141b22,fg=#ebfafa"
set -g message-command-style "bg=#141b22,fg=#ebfafa"

# session pill (rounded green capsule, dark text)
set -g status-left-length 40
set -g status-left "#[fg=#37f499,bg=default]#[fg=#0D1116,bg=#37f499,bold] #S #[fg=#37f499,bg=default] "

# clock stays, in palette
set -g status-right "#[fg=#a5afc2]%a %d %b  %H:%M "

# windows: name + rounded index chip — inactive dim teal, current bright cyan
set -g window-status-separator " "
set -g window-status-format "#[fg=#a5afc2] #W #[fg=#013e4a,bg=default]#[fg=#a5afc2,bg=#013e4a]#I#[fg=#013e4a,bg=default]"
set -g window-status-current-format "#[fg=#ebfafa,bold] #W #[fg=#04d1f9,bg=default]#[fg=#0D1116,bg=#04d1f9,bold]#I#[fg=#04d1f9,bg=default]"
set -g window-status-style "fg=#314154"
set -g window-status-current-style "fg=#ebfafa"
