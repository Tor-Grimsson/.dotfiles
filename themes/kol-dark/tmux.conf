# kol-theme: kol-dark — our quiet-bar structure in the KOL DS palette.
set -g status-style "bg=default,fg=#A39A78"
set -g status-right "#[fg=#A39A78]%a %d %b  %H:%M "
set -g window-status-style          "fg=#5B5B5D"
set -g window-status-current-style  "fg=#F5EBD8"
set -g pane-border-style "fg=#242427"
set -g pane-active-border-style "fg=#FFCF33"
set -g mode-style "bg=#314152,fg=#F5EBD8"
set -g message-style "bg=#242427,fg=#F5EBD8"
set -g message-command-style "bg=#242427,fg=#F5EBD8"

# quiet-bar structure (resets linkarzu's pill formats on switch-back)
set -g status-left ""
set -g status-left-length 10
set -g window-status-separator ""
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
