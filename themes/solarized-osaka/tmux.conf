# kol-theme: solarized-osaka — our quiet-bar structure in craftzdog's palette
# (colors from extras/tmux; NOT his powerline status-left/right — the bar layout stays ours).
set -g status-style "bg=default,fg=#576d74"
set -g status-right "#[fg=#576d74]%a %d %b  %H:%M "
set -g window-status-style          "fg=#576d74"
set -g window-status-current-style  "fg=#fdf5e2"
set -g pane-border-style "fg=#063540"
set -g pane-active-border-style "fg=#268bd3"
set -g mode-style "bg=#063540,fg=#268bd3"
set -g message-style "bg=#063540,fg=#268bd3"
set -g message-command-style "bg=#063540,fg=#268bd3"

# quiet-bar structure (resets linkarzu's pill formats on switch-back)
set -g status-left ""
set -g status-left-length 10
set -g window-status-separator ""
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
