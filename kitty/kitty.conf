# kitty.conf — main kitty terminal (the kol-notes sticky uses its own
# kol-notes.conf and never reads this file).
# Symlinked to ~/.config/kitty/kitty.conf by bootstrap.sh.

font_family      JetBrains Mono
font_size        14.0

hide_window_decorations titlebar-only
window_padding_width    10

# Claude Code: shift+enter → newline instead of submit. kitty sends a plain
# CR for shift+enter by default; ESC+CR is meta-enter, which Claude Code
# (and most readline TUIs) treat as a soft line break.
map shift+enter send_text all \x1b\r

# kol-theme (symlink managed by bin/kol-theme; kitty warns-and-continues if
# it's missing). Running windows: ctrl+shift+f5 reloads, or quit+relaunch.
include current-theme.conf
