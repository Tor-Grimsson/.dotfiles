# kol-notes.conf — the skitty-notes port: nvim-in-Kitty sticky notes, kol-dark.
# Launched by bin/notes-toggle (cmd-alt-n). Not a general kitty config —
# this file exists so the notes window has its own look without touching
# any future main kitty setup.

font_family      JetBrains Mono
font_size        11.0

# ponytail: static px sized for the iMac (16%w × 52%h of 2560×1440);
# make it screen-relative if the MBP share ever matters
remember_window_size  no
initial_window_width  410
initial_window_height 750

hide_window_decorations       titlebar-only
window_padding_width          10
background_opacity            0.94
macos_quit_when_last_window_closed yes
shell_integration             no-title
confirm_os_window_close       0

# kol-dark — from the blessed theme artifact (2fb42b10). Fallback palette:
# the kol-theme include below overrides it when the selector has run.
background            #121215
foreground            #F5EBD8
cursor                #FFCF33
selection_background  #314152
selection_foreground  #F5EBD8

color0  #242427
color1  #AD5038
color2  #4C9A5F
color3  #FFCF33
color4  #3F6485
color5  #6B4E9E
color6  #49A0A2
color7  #EBD5A9
color8  #5B5B5D
color9  #CC7762
color10 #7FB073
color11 #FFEA57
color12 #497DA2
color13 #9179B8
color14 #6FB6B7
color15 #FAF7F0

# kol-theme include (symlink managed by bin/kol-theme; kitty warns-and-continues
# if it's missing). The sticky picks a switch up on its next cmd-alt-n toggle.
include current-theme.conf
