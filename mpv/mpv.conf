# Custom Default OSD Display (replaces seek/pause text)
osd-msg1=FPS: ${container-fps} | Frame: ${estimated-frame-number} / ${estimated-frame-count}

# Custom Terminal Status Line
term-status-msg=FPS: ${container-fps} | Time: ${time-pos}

# --- Quality & Performance ---
profile=high-quality
hwdec=auto-safe
vo=gpu

# --- Window Behavior ---
fs=yes
keep-open=yes

# --- Playback ---
save-position-on-quit=yes

# --- Audio & Subtitles ---
volume-max=200
alang=eng,en,jpn,ja
slang=eng,en
sub-auto=all

