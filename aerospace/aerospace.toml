# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# Refresh the simple-bar workspace chips (Übersicht) on every workspace switch.
# Harmless no-op until Übersicht + simple-bar are installed (osascript just errors quietly).
# sketchybar archived 2026-07-11 → _archive/sketchybar; its old trigger was:
#   'PATH=/opt/homebrew/bin:/usr/local/bin:$PATH sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
# Both hooks refresh the WHOLE bar: this simple-bar version is one widget
# (id simple-bar-index-jsx — the old …spaces-widget… id no longer exists,
# which is why the bar lagged). Focus hook = instant process-widget updates.
exec-on-workspace-change = ['/bin/bash', '-c',
    'osascript -e "tell application id \\"tracesOf.Uebersicht\\" to refresh widget id \\"simple-bar-index-jsx\\"" 2>/dev/null || true'
]
on-focus-changed = [
    "exec-and-forget osascript -e 'tell application id \"tracesOf.Uebersicht\" to refresh widget id \"simple-bar-index-jsx\"' 2>/dev/null || true"
]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        48   # aligns window tops with the widget column (top: 48)
    outer.right =      304   # widget column (280 + 12 right margin) + 12 gap to windows

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    ctrl-alt-slash = 'layout tiles horizontal vertical'
    ctrl-alt-comma = 'layout accordion horizontal vertical'

    # One-key grid layouts (AeroSpace has no native grid — these run the join/move
    # dance in one binding). Built + verified for a flat row of 4 windows.
    # cmd-alt-g → 2x2: two columns of two.  cmd-alt-s → main+stack: 1 big left + rest stacked right.
    # 'stop' boundaries keep focus inside the workspace (won't wander to another monitor/workspace).
    cmd-alt-g = [
        'flatten-workspace-tree',
        'layout tiles horizontal',
        'focus left --boundaries workspace --boundaries-action stop',
        'focus left --boundaries workspace --boundaries-action stop',
        'focus left --boundaries workspace --boundaries-action stop',
        'join-with right',
        'layout tiles vertical',
        'focus right --boundaries workspace --boundaries-action stop',
        'join-with right',
        'layout tiles vertical',
    ]
    cmd-alt-s = [
        'flatten-workspace-tree',
        'layout tiles horizontal',
        'focus left --boundaries workspace --boundaries-action stop',
        'focus left --boundaries workspace --boundaries-action stop',
        'focus left --boundaries workspace --boundaries-action stop',
        'focus right --boundaries workspace --boundaries-action stop',
        'join-with right',
        'layout tiles vertical',
        'focus right --boundaries workspace --boundaries-action stop',
        'move left',
    ]

    # Desk chrome toggles — flip macOS auto-hide via osascript (bin/ scripts).
    # First press triggers a one-time Automation permission prompt.
    cmd-alt-m = 'exec-and-forget ~/.dotfiles/bin/menubar-toggle'
    cmd-alt-d = 'exec-and-forget ~/.dotfiles/bin/dock-toggle'
    cmd-alt-u = 'exec-and-forget ~/.dotfiles/bin/ubersicht-toggle'
    cmd-alt-r = 'exec-and-forget ~/.dotfiles/bin/ubersicht-refresh'
    cmd-alt-n = 'exec-and-forget ~/.dotfiles/bin/notes-toggle'
    cmd-alt-b = 'exec-and-forget ~/.dotfiles/bin/bookmarks-toggle'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    ctrl-alt-h = 'focus left'
    ctrl-alt-j = 'focus down'
    ctrl-alt-k = 'focus up'
    ctrl-alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    ctrl-alt-shift-h = 'move left'
    ctrl-alt-shift-j = 'move down'
    ctrl-alt-shift-k = 'move up'
    ctrl-alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    ctrl-alt-minus = 'resize smart -50'
    ctrl-alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    ctrl-alt-1 = 'workspace 1'
    ctrl-alt-2 = 'workspace 2'
    ctrl-alt-3 = 'workspace 3'
    ctrl-alt-4 = 'workspace 4'
    ctrl-alt-5 = 'workspace 5'
    ctrl-alt-6 = 'workspace 6'
    ctrl-alt-7 = 'workspace 7'
    ctrl-alt-8 = 'workspace 8'
    ctrl-alt-9 = 'workspace 9'
    ctrl-alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    ctrl-alt-b = 'workspace B'
    ctrl-alt-c = 'workspace C'
    ctrl-alt-d = 'workspace D'
    ctrl-alt-e = 'workspace E'
    ctrl-alt-f = 'workspace F'
    ctrl-alt-g = 'workspace G'
    ctrl-alt-i = 'workspace I'
    ctrl-alt-m = 'workspace M'
    ctrl-alt-n = 'workspace N'
    ctrl-alt-o = 'workspace O'
    ctrl-alt-p = 'workspace P'
    ctrl-alt-q = 'workspace Q'
    ctrl-alt-r = 'workspace R'
    ctrl-alt-s = 'workspace S'
    ctrl-alt-t = 'workspace T'
    ctrl-alt-u = 'workspace U'
    ctrl-alt-v = 'workspace V'
    ctrl-alt-w = 'workspace W'
    ctrl-alt-x = 'workspace X'
    ctrl-alt-y = 'workspace Y'
    ctrl-alt-z = 'workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    ctrl-alt-shift-1 = 'move-node-to-workspace 1'
    ctrl-alt-shift-2 = 'move-node-to-workspace 2'
    ctrl-alt-shift-3 = 'move-node-to-workspace 3'
    ctrl-alt-shift-4 = 'move-node-to-workspace 4'
    ctrl-alt-shift-5 = 'move-node-to-workspace 5'
    ctrl-alt-shift-6 = 'move-node-to-workspace 6'
    ctrl-alt-shift-7 = 'move-node-to-workspace 7'
    ctrl-alt-shift-8 = 'move-node-to-workspace 8'
    ctrl-alt-shift-9 = 'move-node-to-workspace 9'
    ctrl-alt-shift-a = 'move-node-to-workspace A'
    ctrl-alt-shift-b = 'move-node-to-workspace B'
    ctrl-alt-shift-c = 'move-node-to-workspace C'
    ctrl-alt-shift-d = 'move-node-to-workspace D'
    ctrl-alt-shift-e = 'move-node-to-workspace E'
    ctrl-alt-shift-f = 'move-node-to-workspace F'
    ctrl-alt-shift-g = 'move-node-to-workspace G'
    ctrl-alt-shift-i = 'move-node-to-workspace I'
    ctrl-alt-shift-m = 'move-node-to-workspace M'
    ctrl-alt-shift-n = 'move-node-to-workspace N'
    ctrl-alt-shift-o = 'move-node-to-workspace O'
    ctrl-alt-shift-p = 'move-node-to-workspace P'
    ctrl-alt-shift-q = 'move-node-to-workspace Q'
    ctrl-alt-shift-r = 'move-node-to-workspace R'
    ctrl-alt-shift-s = 'move-node-to-workspace S'
    ctrl-alt-shift-t = 'move-node-to-workspace T'
    ctrl-alt-shift-u = 'move-node-to-workspace U'
    ctrl-alt-shift-v = 'move-node-to-workspace V'
    ctrl-alt-shift-w = 'move-node-to-workspace W'
    ctrl-alt-shift-x = 'move-node-to-workspace X'
    ctrl-alt-shift-y = 'move-node-to-workspace Y'
    ctrl-alt-shift-z = 'move-node-to-workspace Z'

    cmd-alt-shift-f = 'fullscreen'

    # Disable AeroSpace: stops managing windows AND stops intercepting keys, so
    # app-native shortcuts (Figma, Affinity) work fully. NOTE: while disabled
    # AeroSpace ignores ALL keys, so this binding canNOT re-enable it — bring it
    # back with `aerospace enable on` (terminal, or a Raycast hotkey).
    cmd-alt-shift-d = 'enable off' # d = disable; re-enable via Raycast / CLI

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    ctrl-alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    ctrl-alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    ctrl-alt-shift-semicolon = 'mode service'

    # new mode resize
    cmd-alt-shift-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    b = 'balance-sizes'

    enter = 'mode main'
    esc = 'mode main'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']


# T for Terminal and CLI

# Finder floats (and still lands on W) — a file browser is a palette, not a
# tile; tiling it squashes column view and drags the layout around. Only the
# FIRST matching rule runs, so this combined rule replaces the old W-only one.
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ["layout floating", "move-node-to-workspace W"]

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
if.window-title-regex-substring = 'kol-(notes|bookmarks)'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = "move-node-to-workspace T"

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = "move-node-to-workspace T"

# B for Browsers 

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
run = "move-node-to-workspace B"


# P for graphic editors

[[on-window-detected]]
if.app-id = 'com.canva.affinity'
run = "move-node-to-workspace P"

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = "move-node-to-workspace P"


# O for Obsidian and Note-taking

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = "move-node-to-workspace O"


# M for Mail and Music

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = "move-node-to-workspace M"


# S for Socials and Messages

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = "move-node-to-workspace S"


# W for windows — finder's rule lives up top (floating + W combined)


# A for automation, bots & work

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = "move-node-to-workspace A"

[[on-window-detected]]
if.app-id = 'com.todoist.mac.Todoist'
run = "move-node-to-workspace A"


# Floating-only — no workspace assignment, always opens as a float

[[on-window-detected]]
if.app-id = 'com.apple.TextEdit'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.Passwords'
run = "layout floating"

# Utility windows the SketchyBar chips open (⌘-click) — float so they never reshuffle the tiles.
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = "layout floating"
