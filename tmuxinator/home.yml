# Shell home — fastfetch greeting + the rmpc music player.
# Launch:  mux home   ·   prefix C-d home (window)   ·   prefix C-o home (session)
# fastfetch is a thin top banner; rmpc fills the rest (needs mpd running — see the
# terminal-music doc).
name: home
root: ~/

# pane-layout.sh directive (a comment — tmuxinator + yq both ignore it): keep the
# fastfetch banner to a thin top strip so rmpc gets the room. Lower = more rmpc.
# main-pane-height: 8

windows:
  - home:
      layout: main-horizontal
      panes:
        # main (top strip) — fastfetch greeting (prints once, leaves a shell)
        - fastfetch
        # bottom (fills the rest) — the rmpc music TUI (connects to mpd on :6600)
        - rmpc
