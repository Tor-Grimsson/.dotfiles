# ~/.tmux.conf — beginner-friendly tmux setup
# Managed in ~/.dotfiles/tmux/.tmux.conf (symlinked to ~/.tmux.conf by bootstrap.sh).
# Reload after editing:  prefix r   (prefix = Ctrl-a)
# tmux 3.x syntax. macOS.

# ─────────────────────────────────────────────────────────────
# 1. The basics
# ─────────────────────────────────────────────────────────────

# Mouse: click to focus a pane, drag borders to resize, scroll to
# scroll back. The single biggest quality-of-life win for beginners.
set -g mouse on

# Start windows and panes at 1, not 0 — matches the number row on the
# keyboard (prefix 1 = first window). Renumber so there are no gaps when
# you close one.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Bigger scrollback buffer (default is 2000 lines).
set -g history-limit 50000

# Don't wait after Escape — makes vim/nvim feel instant inside tmux.
set -sg escape-time 10

# True colour. The first line names tmux's own terminal type; the second
# tells tmux your OUTER terminal can do 24-bit colour. Works in iTerm2,
# WezTerm, Ghostty, Kitty, Alacritty. (Plain Apple Terminal.app can't do
# true colour — harmless if so, things just look slightly flatter.)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Pass modified-key sequences (Shift+Enter, etc.) through to the app instead of
# flattening them to a plain Enter. Without this tmux eats the bits that tell
# Shift+Enter apart from Enter, so Claude Code submits instead of inserting a
# newline. `extended-keys on` forwards the sequences; the terminal-features line
# advertises the capability to the OUTER terminal so the handshake happens.
# (tmux 3.2+. Run Claude Code's /terminal-setup in the emulator too.)
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ─────────────────────────────────────────────────────────────
# 2. Keys you'll actually use
# ─────────────────────────────────────────────────────────────
# Prefix is Ctrl-a — closer to the home row than the default Ctrl-b.
# Trade-off: Ctrl-a no longer jumps to the start of the line in the shell.
# Press it TWICE (Ctrl-a Ctrl-a) to send a literal Ctrl-a through.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload this config without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes with visual keys, opening in the SAME folder you're in.
# (tmux's default % and " still work too — these are just easier to remember.)
#   prefix |   → split left/right
#   prefix -   → split top/bottom
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window also opens in the current folder. Inserts just BEFORE the
# current last window instead of appending after it, so whatever you've
# moved to last (prefix G) stays pinned there as you keep adding windows.
bind c new-window -c "#{pane_current_path}" \; swap-window -t "-1" \; select-window -t "-1"

# Move between panes with vim keys (in addition to the default arrows):
#   prefix h / j / k / l  → left / down / up / right
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes by holding prefix and tapping these (repeatable):
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reorder windows — move the CURRENT window, not just view another one.
# Shift+n/p pairs with the stock next/prev-window keys (lowercase = go
# look, uppercase = take the window with you). F/G borrow vim's go-to
# start/end feel (gg / G) for jumping straight to an edge.
#   prefix N / P   move window forward / backward one slot (repeatable)
#   prefix F / G   move window to the first / last slot
# N/P are adjacent (one other window involved) so swap-window is exact.
# F/G can cross several windows — swap-window there would trade places with
# whatever's at the edge and scramble everyone between, so these use
# move-window -b/-a instead: a true relocate that shifts the windows in
# between back by one and leaves their relative order untouched.
bind -r N swap-window -t "+1" \; select-window -t "+1"
bind -r P swap-window -t "-1" \; select-window -t "-1"
bind F move-window -b -t "{start}" \; select-window -t "{start}"
bind G move-window -a -t "{end}" \; select-window -t "{end}"

# ─────────────────────────────────────────────────────────────
# 3. Copy mode (scroll + select text) — vim-style + macOS clipboard
# ─────────────────────────────────────────────────────────────
# Enter copy mode with  prefix [  (or just scroll with the mouse).
# Then move around like vim. Press q to leave.
setw -g mode-keys vi

#   v  → start selecting,  y → copy to the macOS clipboard (pbcopy)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
# Releasing a mouse drag also copies to the clipboard.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ─────────────────────────────────────────────────────────────
# 4. Status bar — quiet, faint window list at the TOP-LEFT
# ─────────────────────────────────────────────────────────────
# Bar sits at the top and blends into the terminal background.
set -g status-position top
set -g status-style "bg=default,fg=#8b8068"

# Make the bar two rows tall and leave the second row blank. That empty
# row is breathing space so the window list isn't jammed up against your
# powerlevel10k prompt below.
set -g status 2
set -g status-format[1] ""
set -g status-left ""                                  # no session block — windows sit flush left
set -g status-right "#[fg=#6b6354]%a %d %b  %H:%M "    # faint clock (delete this line to drop it)

# Window list.  #I = number, #W = name, #F = flag:  * current, - last, Z zoomed
set -g window-status-separator ""
set -g window-status-format         " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
set -g window-status-style          "fg=#8b8068"   # inactive windows: faint
set -g window-status-current-style  "fg=#c8bca0"   # current window: a touch brighter, no highlight box

# Subtle pane border, brighter on the active pane.
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ─────────────────────────────────────────────────────────────
# 5. Session/project managers (TPM plugins)
# ─────────────────────────────────────────────────────────────
# TPM (Tmux Plugin Manager) — cloned + installed by bootstrap.sh. After
# editing the @plugin lines below: prefix r to reload, then prefix I to
# install/update (bootstrap.sh already does this once on a fresh machine).
set -g @plugin 'tmux-plugins/tpm'

# tmux-sessionx — fzf popup session manager, live previews + git branch.
# Being run head-to-head against the standalone `sesh` CLI (see brewfile-cli).
#   prefix O   → open the picker                docs/01-shell-terminal/20-tmux-sessionx.md
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-harpoon — bookmark a handful of sessions, jump back with one key.
# Given its own key table (prefix a) rather than a bare modifier: Alt
# collides globally with AeroSpace's workspace switching, and Ctrl+Shift
# doesn't reach tmux distinctly on this terminal (iTerm2 doesn't report
# Shift on Ctrl-letter combos, so Ctrl+Shift+A arrives as plain Ctrl+A —
# the tmux prefix itself — confirmed live: it silently ate the keystroke).
# This submode lives entirely inside tmux's own prefix system, so neither
# problem applies. @harpoon_key_append is left unset — its fallback binds
# bare Ctrl-h, which section 6 below re-claims for pane nav anyway, inert.
#   docs/01-shell-terminal/22-tmux-harpoon.md
set -g @plugin 'Chaitanyabsprip/tmux-harpoon'

# tmux-agent-sidebar — live status of AI coding agents (Claude Code, Codex,
# OpenCode) across every session/window: prompts, tool calls, background
# shell state, task progress. Complements workmux, doesn't overlap it.
#   prefix e   → toggle in the current window
#   prefix E   → toggle everywhere              docs/01-shell-terminal/25-tmux-agent-sidebar.md
set -g @plugin 'hiroppy/tmux-agent-sidebar'

run '~/.tmux/plugins/tpm/tpm'

bind a switch-client -T harpoon                                     # prefix a → enter harpoon mode (one keypress, auto-exits)
bind -T harpoon a run '~/.tmux/plugins/tmux-harpoon/harpoon -a'      # prefix a, a → bookmark current session
bind -T harpoon e run '~/.tmux/plugins/tmux-harpoon/harpoon -e'      # prefix a, e → edit bookmark list (popup)
bind -T harpoon 1 run '~/.tmux/plugins/tmux-harpoon/harpoon -s 1'    # prefix a, 1 → jump to bookmark 1
bind -T harpoon 2 run '~/.tmux/plugins/tmux-harpoon/harpoon -s 2'    # prefix a, 2 → jump to bookmark 2
bind -T harpoon 3 run '~/.tmux/plugins/tmux-harpoon/harpoon -s 3'    # prefix a, 3 → jump to bookmark 3
bind -T harpoon 4 run '~/.tmux/plugins/tmux-harpoon/harpoon -s 4'    # prefix a, 4 → jump to bookmark 4

# ─────────────────────────────────────────────────────────────
# 6. Seamless nav between tmux panes and Neovim splits
# ─────────────────────────────────────────────────────────────
# vim-tmux-navigator: Ctrl-h/j/k/l (NO prefix) moves between tmux panes AND nvim
# splits with the same keys. The nvim side is the christoomey/vim-tmux-navigator
# plugin (already in your nvim config); this is the tmux side (no tpm needed).
# Trade-off: Ctrl-l no longer clears a shell pane — type `clear` or use prefix.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Same keys also navigate while in copy-mode.
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
