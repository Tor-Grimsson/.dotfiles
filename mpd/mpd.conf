# mpd.conf — Music Player Daemon for the local (Jellyfin) music library.
#
# Symlinked to ~/.config/mpd/mpd.conf by bootstrap.sh. Driven by rmpc (the TUI client).
# Runs as a MOUNT-GUARDED launchd agent (com.kolkrabbi.mpd) — it only runs while the
# external 8TB drive is mounted (launchd KeepAlive→PathState on music_directory).

# The library — on a dedicated SSD (kol-ssd-4000), moved off Jellyfin's 8TB to
# stop the I/O contention that made scanning crawl.
music_directory     "/Volumes/kol-ssd-4000/Music"

# State lives LOCALLY under ~/.config/mpd/ so it survives the drive unmounting —
# never on the external drive itself. (mpd expands the leading ~.)
db_file             "~/.config/mpd/database"
state_file          "~/.config/mpd/state"
sticker_file        "~/.config/mpd/sticker.sql"
playlist_directory  "~/.config/mpd/playlists"
log_file            "~/.config/mpd/log"

# Local only — rmpc connects here.
bind_to_address     "127.0.0.1"
port                "6600"

# macOS mpd (brew) is compiled WITHOUT inotify/kqueue filesystem-watch, so
# `auto_update` is a no-op here regardless of drive — mpd logs "inotify:
# auto_update was disabled" and ignores it. Rescan by hand after adding music:
# `Ctrl-u` in rmpc, or `mpc update`.
auto_update         "no"

restore_paused      "yes"

# macOS CoreAudio output.
audio_output {
    type        "osx"
    name        "CoreAudio"
    mixer_type  "software"
}
