# keymap.toml — merged OVER yazi's default bindings via prepend (yours win on conflict).
# Stock keys (hjkl nav, Space select, y/x/p copy-cut-paste, d trash, a create,
# r rename, . toggle hidden, / filter, s search, : command, q quit) all stay.

# ── Directory jumps (g …) ───────────────────────────────────────────────────
[[mgr.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Go home"

[[mgr.prepend_keymap]]
on = ["g", "p"]
run = "cd ~/thatComp--iMac"
desc = "Go to projects (iMac)"

[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/Desktop"
desc = "Go to Desktop"

[[mgr.prepend_keymap]]
on = ["g", "."]
run = "cd ~/.dotfiles"
desc = "Go to dotfiles repo"

[[mgr.prepend_keymap]]
on = ["g", "t"]
run = "cd ~/_temp"
desc = "Go to _temp"

# ── Quick Look the hovered/selected file(s) (macOS) ─────────────────────────
[[mgr.prepend_keymap]]
on = ["<C-y>"]
run = "shell 'qlmanage -p \"$@\" >/dev/null 2>&1' --orphan"
desc = "Quick Look"

# ── Plugins (installed via `ya pkg add`, see package.toml) ──────────────────
# smart-enter: Enter a directory OR open a file with one key.
[[mgr.prepend_keymap]]
on = ["<Enter>"]
run = "plugin smart-enter"
desc = "Enter dir / open file"

# toggle-pane: maximize the preview (full-screen an image/video), press again to restore.
# (min-preview / max-current / etc. are available via `:plugin toggle-pane <mode>`.)
[[mgr.prepend_keymap]]
on = ["T"]
run = "plugin toggle-pane max-preview"
desc = "Maximize / restore the preview pane"
